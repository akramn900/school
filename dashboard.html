<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchooLama – Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <!-- Clerk SDK — load first, no async/defer -->
  <script
    data-clerk-publishable-key="pk_test_YWxlcnQtY293LTMyLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://unpkg.com/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <!-- Auth guard — always after Clerk SDK -->
  <script src="./js/clerk-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ══ TOKENS ══════════════════════════════════════════════ */
:root {
  --sky:        #C3EBFA;
  --sky-light:  #EDF9FD;
  --purple:     #CFCEFF;
  --purple-light:#F1F0FF;
  --yellow:     #FAE27C;
  --yellow-light:#FEFCE8;
  --bg:         #F7F8FA;
  --white:      #ffffff;
  --text:       #1a1a2e;
  --text-muted: #6b7280;
  --border:     #e5e7eb;
  --primary:    #4361EE;
  --primary-dark:#3451db;
  --danger:     #ef4444;
  --success:    #22c55e;
  --warning:    #f59e0b;
  --sidebar-w:  260px;
  --sidebar-w-collapsed: 68px;
  --topbar-h:   64px;
  --radius:     12px;
  --shadow:     0 2px 16px rgba(0,0,0,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--white);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top:0; left:0; bottom:0;
  z-index: 100; transition: width .25s ease;
  overflow: hidden;
}
.sidebar.collapsed { width: var(--sidebar-w-collapsed); }
.sidebar-logo {
  display:flex; align-items:center; gap:10px;
  padding: 20px 18px; border-bottom: 1px solid var(--border);
  min-height: var(--topbar-h);
}
.logo-icon {
  width:36px; height:36px; min-width:36px;
  background: var(--primary);
  border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  color:white; font-weight:700; font-size:16px;
}
.logo-text {
  font-family:'Playfair Display',serif;
  font-size:20px; color:var(--text);
  white-space:nowrap; overflow:hidden;
}
.sidebar-nav { flex:1; overflow-y:auto; padding: 12px 0; }
.nav-section-label {
  font-size:10px; font-weight:700; letter-spacing:.08em;
  color:var(--text-muted); text-transform:uppercase;
  padding: 14px 20px 6px;
  white-space:nowrap; overflow:hidden;
  transition: opacity .2s;
}
.sidebar.collapsed .nav-section-label { opacity:0; }
.nav-item {
  display:flex; align-items:center; gap:12px;
  padding: 10px 18px; margin: 1px 8px;
  border-radius: 10px; cursor:pointer;
  transition: background .15s, color .15s;
  text-decoration:none; color:var(--text-muted);
  font-size:14px; font-weight:500;
  white-space:nowrap; overflow:hidden;
}
.nav-item:hover { background: var(--bg); color:var(--text); }
.nav-item.active { background: var(--purple-light); color:var(--primary); }
.nav-item .nav-icon {
  font-size:18px; min-width:22px; text-align:center;
}
.nav-item .nav-label { white-space:nowrap; overflow:hidden; }
.sidebar.collapsed .nav-item { justify-content:center; padding:10px; }
.sidebar.collapsed .nav-label { display:none; }
.sidebar-footer {
  padding: 12px; border-top: 1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.user-avatar {
  width:36px; height:36px; min-width:36px;
  border-radius:50%; background:var(--sky);
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:14px; color:var(--primary);
}
.user-info { overflow:hidden; }
.user-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.user-role { font-size:11px; color:var(--text-muted); }
.sidebar.collapsed .user-info { display:none; }

/* ── MAIN ── */
.main-wrapper {
  margin-left: var(--sidebar-w);
  flex:1; display:flex; flex-direction:column;
  transition: margin-left .25s ease;
  min-width:0;
}
.main-wrapper.collapsed { margin-left: var(--sidebar-w-collapsed); }
.topbar {
  height:var(--topbar-h); background:var(--white);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px;
  padding: 0 24px; position:sticky; top:0; z-index:50;
}
.topbar-toggle {
  background:none; border:none; cursor:pointer;
  font-size:20px; color:var(--text-muted); padding:4px;
}
.search-bar {
  flex:1; max-width:320px;
  display:flex; align-items:center; gap:8px;
  background:var(--bg); border:1px solid var(--border);
  border-radius:10px; padding:8px 14px;
}
.search-bar input {
  border:none; background:none; outline:none;
  font-family:'DM Sans',sans-serif; font-size:14px;
  color:var(--text); width:100%;
}
.topbar-actions { margin-left:auto; display:flex; align-items:center; gap:10px; }
.topbar-btn {
  width:38px; height:38px; border-radius:10px;
  background:var(--bg); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; position:relative;
  transition: background .15s;
}
.topbar-btn:hover { background:var(--border); }
.badge {
  position:absolute; top:4px; right:4px;
  width:8px; height:8px; border-radius:50%;
  background:var(--danger);
}
.page-content { padding:24px; flex:1; }

/* ══ PAGE TITLES ══ */
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
.page-title { font-size:22px; font-weight:700; }
.page-subtitle { font-size:13px; color:var(--text-muted); margin-top:2px; }
.btn {
  padding:9px 18px; border-radius:9px; border:none;
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
  cursor:pointer; transition:all .15s; display:inline-flex; align-items:center; gap:6px;
}
.btn-primary { background:var(--primary); color:white; }
.btn-primary:hover { background:var(--primary-dark); }
.btn-sm { padding:7px 14px; font-size:12px; }
.btn-ghost { background:var(--bg); color:var(--text); border:1px solid var(--border); }
.btn-ghost:hover { background:var(--border); }
.btn-danger { background:#fee2e2; color:var(--danger); }
.btn-danger:hover { background:#fecaca; }

/* ══ STAT CARDS ══ */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:24px; }
.stat-card {
  background:var(--white); border-radius:var(--radius);
  padding:20px; display:flex; flex-direction:column; gap:12px;
  border:1px solid var(--border);
}
.stat-card .stat-top { display:flex; align-items:center; justify-content:space-between; }
.stat-card .stat-icon {
  width:42px; height:42px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px;
}
.stat-card .stat-more { font-size:11px; color:var(--text-muted); }
.stat-card .stat-value { font-size:28px; font-weight:700; }
.stat-card .stat-label { font-size:13px; color:var(--text-muted); }
.bg-sky { background:var(--sky); }
.bg-purple { background:var(--purple); }
.bg-yellow { background:var(--yellow); }
.bg-sky-light { background:var(--sky-light); }

/* ══ TABLES ══ */
.table-card {
  background:var(--white); border-radius:var(--radius);
  border:1px solid var(--border); overflow:hidden;
}
.table-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px; border-bottom:1px solid var(--border);
  flex-wrap:wrap; gap:10px;
}
.table-title { font-size:15px; font-weight:600; }
.table-tools { display:flex; align-items:center; gap:8px; }
.table-search {
  display:flex; align-items:center; gap:6px;
  background:var(--bg); border:1px solid var(--border);
  border-radius:8px; padding:7px 12px;
}
.table-search input {
  border:none; background:none; outline:none;
  font-family:'DM Sans',sans-serif; font-size:13px;
  width:180px; color:var(--text);
}
table { width:100%; border-collapse:collapse; }
th { font-size:12px; font-weight:600; text-transform:uppercase;
     letter-spacing:.05em; color:var(--text-muted);
     padding:12px 20px; text-align:left;
     border-bottom:1px solid var(--border); white-space:nowrap; }
td { padding:14px 20px; font-size:14px; border-bottom:1px solid var(--border); vertical-align:middle; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:#fafafa; }
.avatar {
  width:36px; height:36px; border-radius:50%;
  object-fit:cover; background:var(--sky);
  display:inline-flex; align-items:center; justify-content:center;
  font-weight:700; font-size:13px; color:var(--primary);
}
.cell-user { display:flex; align-items:center; gap:10px; }
.cell-user-info .name { font-weight:500; }
.cell-user-info .sub { font-size:12px; color:var(--text-muted); }
.badge-pill {
  display:inline-block; padding:3px 10px; border-radius:20px;
  font-size:11px; font-weight:600;
}
.badge-blue { background:var(--purple-light); color:var(--primary); }
.badge-green { background:#dcfce7; color:#15803d; }
.badge-yellow { background:var(--yellow-light); color:#92400e; }
.badge-red { background:#fee2e2; color:var(--danger); }
.badge-gray { background:var(--bg); color:var(--text-muted); }
.action-btns { display:flex; gap:6px; }
.icon-btn {
  width:30px; height:30px; border-radius:7px; border:none;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; cursor:pointer; transition:all .15s;
}
.icon-btn-view { background:var(--sky-light); color:#0284c7; }
.icon-btn-edit { background:var(--yellow-light); color:#92400e; }
.icon-btn-del  { background:#fee2e2; color:var(--danger); }
.icon-btn:hover { opacity:.8; }
.pagination {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px; border-top:1px solid var(--border);
  font-size:13px; color:var(--text-muted);
}
.page-btns { display:flex; gap:4px; }
.page-btn {
  width:32px; height:32px; border-radius:7px;
  border:1px solid var(--border); background:var(--white);
  font-size:13px; cursor:pointer; display:flex;
  align-items:center; justify-content:center;
  transition:all .15s;
}
.page-btn.active { background:var(--primary); color:white; border-color:var(--primary); }
.page-btn:hover:not(.active) { background:var(--bg); }

/* ══ DASHBOARD SPECIFIC ══ */
.dash-grid {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:auto;
  gap:20px;
}
@media(max-width:1200px){ .dash-grid { grid-template-columns:1fr 1fr; } }
@media(max-width:768px){ .dash-grid { grid-template-columns:1fr; } }
.dash-card {
  background:var(--white); border-radius:var(--radius);
  border:1px solid var(--border); padding:20px;
}
.dash-card-title { font-size:14px; font-weight:600; margin-bottom:16px; }
.chart-wrap { position:relative; height:220px; }
.finance-actions { display:flex; gap:10px; flex-wrap:wrap; }
.finance-panels {
  display:grid; grid-template-columns:repeat(3,minmax(0,1fr));
  gap:16px; margin-top:20px;
}
.finance-panel {
  background:var(--white); border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden;
}
.finance-panel-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 18px; border-bottom:1px solid var(--border);
}
.finance-panel-title { font-size:14px; font-weight:700; }
.finance-setup-note {
  padding:14px 16px; border:1px solid #fde68a;
  background:#fffbeb; color:#92400e; border-radius:var(--radius);
  font-size:13px; line-height:1.5; margin-bottom:18px;
}
.amount-income { color:#15803d; font-weight:700; }
.amount-expense { color:var(--danger); font-weight:700; }
@media(max-width:1100px){ .finance-panels { grid-template-columns:1fr; } }

/* ══ CALENDAR ══ */
.calendar-wrap { padding:0; }
.cal-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.cal-nav-btn {
  width:30px; height:30px; border-radius:7px;
  border:1px solid var(--border); background:var(--white);
  cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s;
}
.cal-nav-btn:hover { background:var(--bg); }
.cal-title { font-weight:600; font-size:15px; }
.cal-grid {
  display:grid; grid-template-columns:repeat(7,1fr);
  gap:2px;
}
.cal-day-name {
  font-size:11px; font-weight:600; text-align:center;
  color:var(--text-muted); padding:4px 0; text-transform:uppercase;
}
.cal-day {
  aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  border-radius:8px; font-size:13px; cursor:pointer;
  transition:background .15s;
}
.cal-day:hover { background:var(--bg); }
.cal-day.other-month { color:var(--border); }
.cal-day.today { background:var(--primary); color:white; font-weight:700; }
.cal-day.has-event { position:relative; }
.cal-day.has-event::after {
  content:''; position:absolute; bottom:3px;
  width:4px; height:4px; border-radius:50%;
  background:var(--primary);
}
.cal-day.today.has-event::after { background:white; }

/* Events list */
.event-list { display:flex; flex-direction:column; gap:8px; }
.event-item {
  display:flex; gap:12px; align-items:flex-start;
  padding:10px; border-radius:10px;
  background:var(--bg);
}
.event-dot { width:10px; height:10px; min-width:10px; border-radius:50%; margin-top:5px; }
.event-info .event-title { font-size:13px; font-weight:600; }
.event-info .event-meta { font-size:11px; color:var(--text-muted); margin-top:2px; }

/* Announcements */
.announcement-item {
  padding:14px 0; border-bottom:1px solid var(--border);
}
.announcement-item:last-child { border-bottom:none; padding-bottom:0; }
.ann-header { display:flex; justify-content:space-between; margin-bottom:4px; }
.ann-title { font-size:13px; font-weight:600; }
.ann-date { font-size:11px; color:var(--text-muted); }
.ann-body { font-size:13px; color:var(--text-muted); line-height:1.5; }

/* ══ MODAL ══ */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.4);
  z-index:200; display:none; align-items:center; justify-content:center;
  padding:20px;
}
.modal-overlay.open { display:flex; }
.modal {
  background:var(--white); border-radius:16px;
  width:100%; max-width:520px; max-height:90vh;
  overflow-y:auto; padding:28px;
  box-shadow:0 20px 60px rgba(0,0,0,.15);
  animation: slideUp .2s ease;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; }
.modal-title { font-size:18px; font-weight:700; }
.modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-muted); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group { margin-bottom:16px; }
.form-group label { display:block; font-size:13px; font-weight:500; margin-bottom:6px; }
.form-group input, .form-group select, .form-group textarea {
  width:100%; padding:10px 14px;
  border:1.5px solid var(--border); border-radius:9px;
  font-family:'DM Sans',sans-serif; font-size:14px;
  color:var(--text); outline:none; transition:border-color .2s;
  background:var(--white);
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--primary); }
.form-group textarea { min-height:80px; resize:vertical; }
.modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:4px; }

/* ══ LOADING ══ */
.loading { display:flex; align-items:center; justify-content:center; padding:60px; }
.spinner {
  width:32px; height:32px; border:3px solid var(--border);
  border-top-color:var(--primary); border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.empty-state {
  text-align:center; padding:60px 20px;
  color:var(--text-muted);
}
.empty-state .empty-icon { font-size:48px; margin-bottom:12px; }
.empty-state p { font-size:14px; }

/* ══ TOAST ══ */
.toast-container { position:fixed; bottom:24px; right:24px; z-index:300; display:flex; flex-direction:column; gap:8px; }
.toast {
  padding:12px 18px; border-radius:10px;
  font-size:14px; font-weight:500;
  box-shadow:0 4px 20px rgba(0,0,0,.15);
  display:flex; align-items:center; gap:8px;
  animation:slideInRight .3s ease;
  min-width:220px;
}
@keyframes slideInRight { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
.toast-success { background:#dcfce7; color:#15803d; }
.toast-error { background:#fee2e2; color:var(--danger); }
.toast-info { background:var(--purple-light); color:var(--primary); }

/* ══ PROFILE / SINGLE VIEW ══ */
.profile-card {
  background:var(--white); border-radius:var(--radius);
  border:1px solid var(--border); padding:28px;
  display:flex; gap:24px; align-items:flex-start;
  flex-wrap:wrap;
}
.profile-avatar-big {
  width:80px; height:80px; border-radius:50%;
  background:var(--sky); display:flex; align-items:center;
  justify-content:center; font-size:32px; font-weight:700;
  color:var(--primary); flex-shrink:0;
}
.profile-info h2 { font-size:22px; font-weight:700; margin-bottom:4px; }
.profile-meta { display:flex; flex-wrap:wrap; gap:10px; margin-top:10px; }
.profile-meta-item {
  display:flex; align-items:center; gap:6px;
  font-size:13px; color:var(--text-muted);
}
.info-grid {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px; background:var(--white);
  border:1px solid var(--border); border-radius:var(--radius); padding:20px;
}
.info-item .label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--text-muted); }
.info-item .value { font-size:14px; font-weight:500; margin-top:4px; }

/* ══ ATTENDANCE ══ */
.att-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(36px,1fr)); gap:4px; }
.att-day {
  aspect-ratio:1; border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:600;
}
.att-present { background:#dcfce7; color:#15803d; }
.att-absent { background:#fee2e2; color:var(--danger); }
.att-late { background:var(--yellow-light); color:#92400e; }
.att-none { background:var(--bg); color:var(--text-muted); }

/* ══ RESPONSIVE ══ */
@media(max-width:768px) {
  .sidebar { transform:translateX(-100%); }
  .sidebar.mobile-open { transform:translateX(0); }
  .main-wrapper { margin-left:0 !important; }
  .form-row { grid-template-columns:1fr; }
  .topbar { padding:0 16px; }
  .page-content { padding:16px; }
  table { font-size:13px; }
  th, td { padding:10px 14px; }
}

/* hide pages */
.page { display:none; }
.page.active { display:block; }
</style>
</head>
<body>

<!-- ══ SIDEBAR ══════════════════════════════════════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">S</div>
    <span class="logo-text">SchooLama</span>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
  <div class="sidebar-footer">
    <div class="user-avatar" id="sb-avatar">A</div>
    <div class="user-info">
      <div class="user-name" id="sb-name">Admin User</div>
      <div class="user-role" id="sb-role">Administrator</div>
    </div>
  </div>
</aside>

<!-- ══ MAIN ══════════════════════════════════════════════ -->
<div class="main-wrapper" id="main-wrapper">
  <header class="topbar">
    <button class="topbar-toggle" onclick="toggleSidebar()">☰</button>
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" placeholder="Search…" id="global-search">
    </div>
    <div class="topbar-actions">
<button class="topbar-btn" onclick="openNotifications()" title="Notifications">🔔<span class="badge"></span></button>
<button class="topbar-btn" onclick="openMessages()" title="Messages">✉️</button>
<button class="topbar-btn" onclick="doLogout()" title="Logout">🚪</button>
    </div>
  </header>

  <main class="page-content">
    <!-- All pages injected here -->
    <div id="pages-container"></div>
  </main>

function initials(name){
  if(!name) return '?';
  return name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
}
function fmtDate(d){ if(!d) return '—'; return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtTime(d){ if(!d) return '—'; return new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }

  teachers: 'Teacher',
  students: 'Student',
  parents: 'Parent',
  subjects: 'Subject',

  lessons: 'Lesson',

  salaries: 'Teacher Salary',
};

function tableLabel(table){ return TABLE_LABELS[table] || table; }
function escapeHtml(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#39;',
  }[ch]));
}
function jsArg(value){
  return `'${String(value ?? '')
    .replace(/\\/g,'\\\\')
    .replace(/'/g,"\\'")
    .replace(/\r/g,'\\r')
    .replace(/\n/g,'\\n')}'`;
}
function callHandler(fn, ...args){ return `${fn}(${args.map(jsArg).join(',')})`; }
function isoDay(year, month, day){
  const d = new Date(year, month, day);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function sameDay(value, dayIso){
  if(!value) return false;
  return String(value).slice(0,10) === dayIso;
}
function inputValue(value, type){
  if(value === null || value === undefined) return '';
  const raw = String(value);
  if(type === 'date') return raw.slice(0,10);
  if(type === 'datetime-local') return raw.slice(0,16);
  return raw;
}
function fmtMoney(value){
  const amount = Number(value) || 0;
  return amount.toLocaleString('en-IN', { style:'currency', currency:'INR', maximumFractionDigits:0 });
}
function sumAmount(rows){
  return (rows || []).reduce((total, row) => total + (Number(row.amount) || 0), 0);
}
function recentMonthKeys(){
  const today = new Date();
  return Array.from({length:6}, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth() - 5 + i, 1);
    return {
      key: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`,
      label: d.toLocaleString('default', {month:'short'}),
    };
  });
}
function financeSeries(payments = [], salaries = []){
  const months = recentMonthKeys();
  const income = months.map(m => sumAmount(payments.filter(p => String(p.paidAt || '').slice(0,7) === m.key)));
  const expense = months.map(m => sumAmount(salaries.filter(s => String(s.paidAt || '').slice(0,7) === m.key)));
  return { labels: months.map(m => m.label), income, expense };
}
async function fetchFinanceTable(table, orderColumn){
  let query = sb.from(table).select('*');
  if(orderColumn) query = query.order(orderColumn, {ascending:false});
  const {data, error} = await query;
  return { data: data || [], error };
}
async function loadFinanceData(){
  const [fees, payments, salaries] = await Promise.all([
    fetchFinanceTable('fees', 'dueDate'),
    fetchFinanceTable('payments', 'paidAt'),
    fetchFinanceTable('salaries', 'paidAt'),
  ]);
  return {
    fees: fees.data,
    payments: payments.data,
    salaries: salaries.data,
    errors: [fees.error, payments.error, salaries.error].filter(Boolean),
  };
}

// ══ MINI CALENDAR ══════════════════════════════════════════
function buildMiniCal(events = calendarEvents){
  const el = document.getElementById('mini-cal');
  if(!el) return;
  const now = new Date();
  const first = new Date(calYear, calMonth, 1);
  const last  = new Date(calYear, calMonth+1, 0);
  const startDay = first.getDay(); // 0=Sun
  const monthName = first.toLocaleString('default',{month:'long'});

  let html = `
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
      <span class="cal-title">${monthName} ${calYear}</span>
      <button class="cal-nav-btn" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid">
      ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-day-name">${d}</div>`).join('')}`;

  // blank slots
  for(let i=0;i<startDay;i++) html+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const dateIso = isoDay(calYear, calMonth, d);
    const isToday = d===now.getDate()&&calMonth===now.getMonth()&&calYear===now.getFullYear();
    const hasEvent = (events||[]).some(e=>sameDay(e.startTime, dateIso));
    html+=`<div class="cal-day${isToday?' today':''}${hasEvent?' has-event':''}" role="button" tabindex="0" onclick="openDayEvents('${dateIso}')" onkeydown="if(event.key==='Enter'||event.key===' ') openDayEvents('${dateIso}')">${d}</div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}
function calNav(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  buildMiniCal(calendarEvents);
}

function openDayEvents(dateIso){
  const events = (calendarEvents||[]).filter(e=>sameDay(e.startTime, dateIso));

async function fetchAndRenderTable(table, title){
  const from = (listPage-1)*PAGE_SIZE;
  let query = sb.from(table).select('*',{count:'exact'}).range(from, from+PAGE_SIZE-1);
  if(listFilter) {
    const searchColumn = SEARCH_COLUMNS[table] || 'name';
    query = query.ilike(searchColumn, `%${listFilter}%`);
  }
  const {data, count, error} = await query;

  const body = document.getElementById('list-body');
  if(error){
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Error: ${error.message}</p></div>`;
    return;
  }
  if(!data?.length){
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>No records found</p></div>`;
    return;
  }

  const cols = Object.keys(data[0]).filter(k=>!['id','createdAt','updatedAt','img'].includes(k)).slice(0,6);
  body.innerHTML = `
    <div style="overflow-x:auto">
    <table>
      <thead><tr>
        ${['Info',...cols.slice(1),'Actions'].map(h=>`<th>${h}</th>`).join('')}
      </tr></thead>
      <tbody>
        ${data.map(row=>`
          <tr>
            <td>
              <div class="cell-user">
                <div class="avatar">${initials(row.name||row.title||row.username||String(row.id))}</div>
                <div class="cell-user-info">
                  <div class="name">${row.name||row.title||row.username||'—'}</div>
                  <div class="sub">${row.email||row.description||''}</div>
                </div>
              </div>
            </td>
            ${cols.slice(1).map(k=>`<td>${formatCell(row[k], k)}</td>`).join('')}
            <td>
              <div class="action-btns">
                <button class="icon-btn icon-btn-view" onclick="${callHandler('viewRecord', table, row.id)}" title="View">👁</button>
                ${currentUser.role==='admin'?`
                  <button class="icon-btn icon-btn-edit" onclick="${callHandler('editRecord', table, row.id)}" title="Edit">✏️</button>
                  <button class="icon-btn icon-btn-del"  onclick="${callHandler('deleteRecord', table, row.id)}" title="Delete">🗑</button>
                `:''}
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
    </div>
    <div class="pagination">
      <span>Showing ${from+1}–${Math.min(from+PAGE_SIZE, count)} of ${count}</span>
      <div class="page-btns">
        ${listPage>1?`<button class="page-btn" onclick="goPage(${listPage-1},'${table}','${title}')">‹</button>`:''}
        ${Array.from({length:Math.ceil(count/PAGE_SIZE)},(_,i)=>i+1).slice(Math.max(0,listPage-3),listPage+2).map(p=>`
          <button class="page-btn${p===listPage?' active':''}" onclick="goPage(${p},'${table}','${title}')">${p}</button>`).join('')}
        ${listPage<Math.ceil(count/PAGE_SIZE)?`<button class="page-btn" onclick="goPage(${listPage+1},'${table}','${title}')">›</button>`:''}
      </div>
    </div>`;
}

function formatCell(val, key=''){
  if(val===null||val===undefined) return '—';
  if(String(key).toLowerCase().includes('amount')) return fmtMoney(val);
  if(String(key).toLowerCase()==='status') {
    const status = String(val);
    const cls = status.toLowerCase()==='paid' ? 'badge-green' : status.toLowerCase()==='pending' ? 'badge-yellow' : 'badge-gray';
    return `<span class="badge-pill ${cls}">${escapeHtml(status)}</span>`;
  }
  if(typeof val==='boolean') return val?'<span class="badge-pill badge-green">Yes</span>':'<span class="badge-pill badge-red">No</span>';
  if(typeof val==='string' && val.match(/^\d{4}-\d{2}-\d{2}/)) return fmtDate(val);
  if(typeof val==='string' && val.length>40) return val.slice(0,40)+'…';
  return val;
}

function filterList(val, table, title){
  listFilter = val; listPage = 1;
  fetchAndRenderTable(table, title);
}
function goPage(p, table, title){ listPage=p; fetchAndRenderTable(table,title); }

function buildForm(fields, mode, table, id='', data={}){
  let pairs = [];
  for(let i=0;i<fields.length;i+=2){
    const f1=fields[i], f2=fields[i+1];
    pairs.push(`<div class="form-row">
      ${fieldHTML(f1,data)} ${f2?fieldHTML(f2,data):'<div></div>'}
    </div>`);
  }
  return `<form onsubmit="${callHandler('saveRecord', 'event', table, mode, id).replace("'event'", 'event')}">
    ${pairs.join('')}
    <div class="modal-footer">
      <button type="button" class="btn btn-ghost" onclick="closeModalDirect()">Cancel</button>
      <button type="submit" class="btn btn-primary">${mode==='add'?'Create':'Update'}</button>
    </div>
  </form>`;
}

function fieldHTML(f, data){
  const val = inputValue(data[f.n], f.t);
  if(f.t==='select') return `
    <div class="form-group">
      <label>${f.l}${f.req?' *':''}</label>
      <select name="${f.n}"${f.req?' required':''}>
        <option value="">Select…</option>
        ${f.opts.map(o=>`<option value="${escapeHtml(o)}"${val==o?' selected':''}>${escapeHtml(o)}</option>`).join('')}
      </select>
    </div>`;
  if(f.t==='textarea') return `
    <div class="form-group">
      <label>${f.l}</label>
      <textarea name="${f.n}">${escapeHtml(val)}</textarea>
    </div>`;
  return `
    <div class="form-group">
      <label>${f.l}${f.req?' *':''}</label>
      <input type="${f.t}" name="${f.n}" value="${escapeHtml(val)}"${f.req?' required':''}>
    </div>`;
}

async function saveRecord(e, table, mode, id){
  e.preventDefault();
  const form = e.target;
  const formData = new FormData(form);
  const payload = {};
  const fields = getTableFields(table);
  formData.forEach((v,k)=>{
    if(v === '') return;
    const field = fields.find(f=>f.n===k);
    payload[k] = normalizeFieldValue(v, field?.t);
  });

  let error;
  if(mode==='add'){
    ({error} = await sb.from(table).insert(payload));
  } else {
    ({error} = await sb.from(table).update(payload).eq('id',id));
  }
  if(error){ toast(error.message,'error'); return; }
  toast(mode==='add'?'Created successfully!':'Updated successfully!','success');
  closeModalDirect();
  navigate(currentPage);
}

function normalizeFieldValue(value, type){
  if(type === 'number') return Number(value);
  if(value === 'true') return true;
  if(value === 'false') return false;
  return value;
}

function renderEvtCal(events){
  const first = new Date(calYear, calMonth, 1);
  const last  = new Date(calYear, calMonth+1, 0);
  const startDay = first.getDay();
  document.getElementById('evt-cal-title').textContent =
    first.toLocaleString('default',{month:'long'})+' '+calYear;

  let html = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-day-name">${d}</div>`).join('');
  for(let i=0;i<startDay;i++) html+=`<div class="cal-day other-month"></div>`;
  const now = new Date();
  for(let d=1;d<=last.getDate();d++){
    const dateIso = isoDay(calYear, calMonth, d);
    const isToday = d===now.getDate()&&calMonth===now.getMonth()&&calYear===now.getFullYear();
    const hasEv = (events||[]).some(e=>sameDay(e.startTime, dateIso));
    html+=`<div class="cal-day${isToday?' today':''}${hasEv?' has-event':''}" role="button" tabindex="0" onclick="openDayEvents('${dateIso}')" onkeydown="if(event.key==='Enter'||event.key===' ') openDayEvents('${dateIso}')">${d}</div>`;
  }
  document.getElementById('evt-cal-grid').innerHTML=html;
}

  const el = document.getElementById('evt-list');
  if(!events.length){
    el.innerHTML='<div style="color:var(--text-muted);font-size:13px">No events found</div>'; return;
  }
  el.innerHTML=events.slice(0,8).map((e,i)=>`
    <div class="event-item" style="margin-bottom:8px">
      <div class="event-dot" style="background:${COLORS[i%COLORS.length]}"></div>
      <div class="event-info" style="flex:1">
        <div class="event-title">${e.title}</div>
        <div class="event-meta">${fmtDate(e.startTime)}</div>
      </div>
      ${currentUser.role==='admin'?`
        <button class="icon-btn icon-btn-del" onclick="${callHandler('deleteRecord', 'events', e.id)}" style="margin-left:auto">🗑</button>
      `:''}
    </div>`).join('');
}

function evtCalNav(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;}
  if(calMonth>11){calMonth=0;calYear++;}
  // re-fetch
  sb.from('events').select('*').then(({data})=>{
    calendarEvents = data || [];
    renderEvtCal(calendarEvents);
  });
}

// ══ ANNOUNCEMENTS PAGE ════════════════════════════════════
async function renderAnnouncementsPage(){
  const c = document.getElementById('pages-container');
  const {data, error} = await sb.from('announcements').select('*').order('date',{ascending:false});

  c.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Announcements</div>
        <div class="page-subtitle">School-wide communications</div>
      </div>
      ${currentUser.role==='admin'?`<button class="btn btn-primary" onclick="${callHandler('openAddModal', 'announcements')}">+ Add Announcement</button>`:''}
    </div>
    <div style="display:flex;flex-direction:column;gap:14px" id="ann-list"></div>`;

  const el = document.getElementById('ann-list');
  if(!data?.length){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📢</div><p>No announcements yet</p></div>'; return;
  }
  el.innerHTML=data.map((a,i)=>`
    <div class="dash-card" style="border-left:4px solid ${COLORS[i%COLORS.length]}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-size:16px;font-weight:700;margin-bottom:6px">${a.title}</div>
          <div style="font-size:13px;color:var(--text-muted);line-height:1.6">${a.description||''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
          <span style="font-size:12px;color:var(--text-muted)">${fmtDate(a.date)}</span>
          ${currentUser.role==='admin'?`
            <div class="action-btns">
              <button class="icon-btn icon-btn-edit" onclick="${callHandler('editRecord', 'announcements', a.id)}">✏️</button>
              <button class="icon-btn icon-btn-del"  onclick="${callHandler('deleteRecord', 'announcements', a.id)}">🗑</button>
            </div>`:''}
        </div>
      </div>
    </div>`).join('');
}

// ══ GLOBAL SEARCH ══════════════════════════════════════════
document.getElementById('global-search').addEventListener('keydown', async e=>{
  if(e.key!=='Enter') return;
  const q = e.target.value.trim();
  if(!q) return;
  const c = document.getElementById('pages-container');
  c.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  const [t,s,p] = await Promise.all([
    sb.from('teachers').select('id,name,email').ilike('name',`%${q}%`).limit(5),
    sb.from('students').select('id,name,email').ilike('name',`%${q}%`).limit(5),
    sb.from('parents').select('id,name,email').ilike('name',`%${q}%`).limit(5),
  ]);
  const groups = [
    {label:'Teachers',data:t.data,table:'teachers'},
    {label:'Students',data:s.data,table:'students'},
    {label:'Parents',data:p.data,table:'parents'},
  ].filter(g=>g.data?.length);

  currentPage='search';
  buildSidebar();
  c.innerHTML=`
    <div class="page-header"><div class="page-title">Search: "${q}"</div></div>
    ${groups.length===0?'<div class="empty-state"><div class="empty-icon">🔍</div><p>No results found</p></div>':
      groups.map(g=>`
        <div style="margin-bottom:20px">
          <div style="font-weight:600;margin-bottom:10px">${g.label}</div>
          <div class="table-card">
            <table><tbody>
              ${g.data.map(r=>`
                <tr>
                  <td><div class="cell-user">
                    <div class="avatar">${initials(r.name)}</div>
                    <div class="cell-user-info">
                      <div class="name">${r.name}</div>
                      <div class="sub">${r.email||''}</div>
                    </div>
                  </div></td>
                  <td><button class="btn btn-sm btn-ghost" onclick="${callHandler('viewRecord', g.table, r.id)}">View</button></td>
                </tr>`).join('')}
            </tbody></table>
          </div>
        </div>`).join('')}`;
});

// ══ INIT ══════════════════════════════════════════════════
buildSidebar();
renderPage('dashboard');
</script>
</body>
</html>
