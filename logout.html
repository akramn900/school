<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signing out…</title>
  <style>
    body { margin: 0; display: flex; align-items: center; justify-content: center;
           height: 100vh; font-family: sans-serif; background: #f9fafb; color: #555; }
  </style>
  <script
    data-clerk-publishable-key="pk_live_Y2xlcmsuYWtyYW1zY2hvb2wucGFnZXMuZGV2JA"
    src="https://unpkg.com/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
</head>
<body>
  <p>Signing out…</p>
  <script>
    (async function () {
      // Clear all local auth data
      localStorage.removeItem('school_user');
      localStorage.removeItem('school_token');
      localStorage.removeItem('school_pending_role');
      localStorage.removeItem('clerk_signing_out');

      // Set a sessionStorage flag so index.html knows to force-signout
      // (survives the navigation but not the Clerk SDK's own cache)
      sessionStorage.setItem('school_logging_out', '1');

      try {
        if (typeof window.Clerk !== 'undefined') {
          await window.Clerk.load();
          if (window.Clerk.user) {
            await window.Clerk.signOut();
          }
        }
      } catch (e) {
        console.warn('Clerk signOut error:', e);
      }

      // ?logout=1 tells index.html to sign out again if Clerk session persists
      window.location.replace('./index.html?logout=1');
    })();
  </script>
</body>
</html>
