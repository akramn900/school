<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Parent Dashboard – SchoolMS</title>
  <link rel="stylesheet" href="../css/style.css">
  <script>window.BACKEND_URL='https://script.google.com/macros/s/AKfycbz42jbxkFCmq0F9F8jo7kka9PuYraYBO8vU1z0FSkVRxmHVt069gy9JYdP06K5-vrECRw/exec';</script>
  <script
    data-clerk-publishable-key="pk_live_Y2xlcmsuYWtyYW1zY2hvb2wucGFnZXMuZGV2JA"
    src="https://unpkg.com/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script src="../js/clerk-auth.js"></script>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="top-header">
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <div class="header-search"><span>🔍</span><input type="text" placeholder="Search…"></div>
      <div class="header-right"><div class="user-badge" id="user-info"></div></div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <h1 class="page-title" id="welcome-msg">Parent Dashboard</h1>
        <span class="text-muted text-sm" id="date-label"></span>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <!-- Child results -->
        <div class="card">
          <h2 style="font-size:1rem;font-weight:700;margin-bottom:12px">📊 Recent Results</h2>
          <div id="results-list"><div class="loading">Loading…</div></div>
          <a href="results.html" class="btn btn-ghost btn-sm mt-4">View All Results</a>
        </div>

        <!-- Attendance -->
        <div class="card">
          <h2 style="font-size:1rem;font-weight:700;margin-bottom:12px">✅ Attendance</h2>
          <div id="att-list"><div class="loading">Loading…</div></div>
          <a href="attendance.html" class="btn btn-ghost btn-sm mt-4">View Full Attendance</a>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px">
        <div class="card">
          <h2 style="font-size:1rem;font-weight:700;margin-bottom:12px">📅 Upcoming Events</h2>
          <div id="events-list"><div class="loading">Loading…</div></div>
        </div>
        <div class="card">
          <h2 style="font-size:1rem;font-weight:700;margin-bottom:12px">📢 Announcements</h2>
          <div id="ann-list"><div class="loading">Loading…</div></div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="../js/api.js"></script><script src="../js/utils.js"></script><script src="../js/sidebar.js"></script>
<script>
  const user = initLayout(['parent']);
  document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  if (user) document.getElementById('welcome-msg').textContent = `Hello, ${user.username} 👨‍👩‍👧`;

  async function loadResults() {
    try {
      const res = await API.getResults({limit:6});
      const el  = document.getElementById('results-list');
      if (!res.data.length) { el.innerHTML='<p class="empty-state">No results yet.</p>'; return; }
      el.innerHTML = res.data.map(r=>{
        const s=parseFloat(r.score)||0;
        const cls=s>=80?'badge-green':s>=50?'badge-yellow':'badge-red';
        return `<div style="padding:9px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <span class="text-sm">${r.examId?'Exam: '+r.examId:'Assign: '+r.assignmentId}</span>
          <span class="badge ${cls}">${s}</span>
        </div>`;
      }).join('');
    } catch (_) {}
  }

  async function loadAttendance() {
    try {
      const res = await API.getAttendance({limit:8});
      const el  = document.getElementById('att-list');
      if (!res.data.length) { el.innerHTML='<p class="empty-state">No records.</p>'; return; }
      el.innerHTML = res.data.map(a=>{
        const present = a.present==='true'||a.present===true;
        return `<div style="padding:9px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <span class="text-sm">${fmtDate(a.date)}</span>
          <span class="badge ${present?'badge-green':'badge-red'}">${present?'Present':'Absent'}</span>
        </div>`;
      }).join('');
    } catch (_) {}
  }

  async function loadEvents() {
    try {
      const res = await API.getEvents({limit:4});
      const el  = document.getElementById('events-list');
      if (!res.data.length) { el.innerHTML='<p class="empty-state">No events.</p>'; return; }
      el.innerHTML = res.data.map(ev=>`
        <div style="padding:9px 0;border-bottom:1px solid var(--border)">
          <div style="font-weight:600;font-size:.9rem">${ev.title}</div>
          <div class="text-sm text-muted">${fmtDateTime(ev.startTime)}</div>
        </div>`).join('');
    } catch (_) {}
  }

  async function loadAnn() {
    try {
      const res = await API.getAnnouncements({limit:4});
      const el  = document.getElementById('ann-list');
      if (!res.data.length) { el.innerHTML='<p class="empty-state">No announcements.</p>'; return; }
      el.innerHTML = res.data.map(a=>`
        <div style="padding:9px 0;border-bottom:1px solid var(--border)">
          <div style="font-weight:600;font-size:.9rem">${a.title}</div>
          <div class="text-sm text-muted">${fmtDate(a.date)}</div>
        </div>`).join('');
    } catch (_) {}
  }

  loadResults(); loadAttendance(); loadEvents(); loadAnn();
</script>
</body>
</html>
