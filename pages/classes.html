<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Classes – SchoolMS</title>
  <link rel="stylesheet" href="../css/style.css">
  <script>window.BACKEND_URL='https://script.google.com/macros/s/AKfycbz42jbxkFCmq0F9F8jo7kka9PuYraYBO8vU1z0FSkVRxmHVt069gy9JYdP06K5-vrECRw/exec';</script>
  <script
    data-clerk-publishable-key="pk_live_Y2xlcmsuYWtyYW1zY2hvb2wucGFnZXMuZGV2JA"
    src="https://unpkg.com/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script src="../js/clerk-auth.js"></script>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="top-header">
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <div class="header-search"><span>🔍</span><input type="text" placeholder="Search…" id="search-input"></div>
      <div class="header-right"><div class="user-badge" id="user-info"></div></div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <h1 class="page-title">🏛️ Classes</h1>
        <button class="btn btn-primary" id="create-btn">+ Add Class</button>
      </div>
      <div class="card">
        <div id="data-table-container"><div class="loading">Loading…</div></div>
        <div id="pagination"></div>
      </div>
    </main>
  </div>
</div>
<script src="../js/api.js"></script><script src="../js/utils.js"></script>
<script src="../js/sidebar.js"></script><script src="../js/crud-page.js"></script>
<script>
initCrudPage({
  resource:'classes', allowedRoles:['admin'],
  apiList:p=>API.getClasses(p), apiCreate:d=>API.createClass(d),
  apiUpdate:d=>API.updateClass(d), apiDelete:id=>API.deleteClass(id),
  searchKey:'name',
  columns:[
    {key:'name',        label:'Class Name'},
    {key:'gradeId',     label:'Grade',    render:r=>`<span class="badge badge-sky">Grade ${r.gradeId}</span>`},
    {key:'capacity',    label:'Capacity', render:r=>`<span class="badge badge-purple">${r.capacity}</span>`},
    {key:'supervisorId',label:'Supervisor ID'},
  ],
  formFields:[
    {name:'name',        label:'Class Name',  required:true},
    {name:'gradeId',     label:'Grade',       required:true, type:'select', options:[1,2,3,4,5,6].map(v=>({value:v,label:`Grade ${v}`}))},
    {name:'capacity',    label:'Capacity',    type:'number'},
    {name:'supervisorId',label:'Supervisor (Teacher ID)'},
  ],
});
</script>
</body>
</html>
