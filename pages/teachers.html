<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teachers – SchoolMS</title>
  <link rel="stylesheet" href="../css/style.css">
  <script>window.BACKEND_URL = 'https://script.google.com/macros/s/AKfycbz42jbxkFCmq0F9F8jo7kka9PuYraYBO8vU1z0FSkVRxmHVt069gy9JYdP06K5-vrECRw/exec';</script>
  <script
    data-clerk-publishable-key="pk_live_Y2xlcmsuYWtyYW1zY2hvb2wucGFnZXMuZGV2JA"
    src="https://unpkg.com/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script src="../js/clerk-auth.js"></script>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="top-header">
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <div class="header-search"><span>🔍</span><input type="text" placeholder="Search by name…" id="search-input"></div>
      <div class="header-right"><div class="user-badge" id="user-info"></div></div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <h1 class="page-title">👩‍🏫 Teachers</h1>
        <button class="btn btn-primary" id="create-btn">+ Add Teacher</button>
      </div>
      <div class="card">
        <div id="data-table-container"><div class="loading">Loading…</div></div>
        <div id="pagination"></div>
      </div>
    </main>
  </div>
</div>
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/crud-page.js"></script>
<script>
initCrudPage({
  resource:'teachers', allowedRoles:['admin'],
  apiList:   p  => API.getTeachers(p),
  apiCreate: d  => API.createTeacher(d),
  apiUpdate: d  => API.updateTeacher(d),
  apiDelete: id => API.deleteTeacher(id),
  searchKey: 'name',
  columns:[
    { key:'img',      label:'Photo',   render:r=>r.img?`<img class="avatar" src="${r.img}">`:`<div class="avatar">${(r.name||'?')[0]}</div>` },
    { key:'name',     label:'Name',    render:r=>`<strong>${r.name} ${r.surname}</strong><br><span class="text-sm text-muted">${r.username}</span>` },
    { key:'email',    label:'Email' },
    { key:'phone',    label:'Phone' },
    { key:'sex',      label:'Gender',  render:r=>`<span class="badge badge-purple">${r.sex||'—'}</span>` },
    { key:'bloodType',label:'Blood Type' },
    { key:'birthday', label:'Birthday', render:r=>fmtDate(r.birthday) },
  ],
  formFields:[
    { name:'username', label:'Username', required:true },
    { name:'password', label:'Password', type:'password' },
    { name:'name',     label:'First Name', required:true },
    { name:'surname',  label:'Last Name',  required:true },
    { name:'email',    label:'Email',      type:'email' },
    { name:'phone',    label:'Phone' },
    { name:'address',  label:'Address',    span2:true },
    { name:'birthday', label:'Birthday',   type:'date' },
    { name:'sex',      label:'Gender',     type:'select', options:[{value:'MALE',label:'Male'},{value:'FEMALE',label:'Female'}] },
    { name:'bloodType',label:'Blood Type', type:'select', options:['A+','A-','B+','B-','AB+','AB-','O+','O-'].map(v=>({value:v,label:v})) },
    { name:'img',      label:'Photo URL',  span2:true },
  ],
});
</script>
</body>
</html>
