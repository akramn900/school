<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Lessons – SchoolMS</title>
  <link rel="stylesheet" href="../css/style.css">
  <script>window.BACKEND_URL='https://script.google.com/macros/s/AKfycbz42jbxkFCmq0F9F8jo7kka9PuYraYBO8vU1z0FSkVRxmHVt069gy9JYdP06K5-vrECRw/exec';</script>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="top-header">
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <div class="header-search"><span>🔍</span><input type="text" placeholder="Search…" id="search-input"></div>
      <div class="header-right"><div class="user-badge" id="user-info"></div></div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <h1 class="page-title">📖 Lessons</h1>
        <button class="btn btn-primary" id="create-btn" style="display:none">+ Add Lesson</button>
      </div>
      <div class="card">
        <div id="data-table-container"><div class="loading">Loading…</div></div>
        <div id="pagination"></div>
      </div>
    </main>
  </div>
</div>
<script src="../js/api.js"></script><script src="../js/utils.js"></script>
<script src="../js/sidebar.js"></script><script src="../js/crud-page.js"></script>
<script>
const DAYS = ['MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY'];
initCrudPage({
  resource:'lessons', allowedRoles:['admin','teacher'],
  apiList:p=>API.getLessons(p),
  apiCreate:d=>API.createLesson(d),
  apiUpdate:d=>API.updateLesson(d),
  apiDelete:id=>API.deleteLesson(id),
  searchKey:'name',
  columns:[
    {key:'name',      label:'Lesson'},
    {key:'subjectId', label:'Subject ID'},
    {key:'classId',   label:'Class ID'},
    {key:'teacherId', label:'Teacher ID'},
    {key:'day',       label:'Day',      render:r=>`<span class="badge badge-sky">${r.day||'—'}</span>`},
    {key:'startTime', label:'Start',    render:r=>r.startTime||'—'},
    {key:'endTime',   label:'End',      render:r=>r.endTime||'—'},
  ],
  formFields:[
    {name:'name',     label:'Lesson Name', required:true},
    {name:'subjectId',label:'Subject ID',  required:true},
    {name:'classId',  label:'Class ID',    required:true},
    {name:'teacherId',label:'Teacher ID',  required:true},
    {name:'day',      label:'Day',         required:true, type:'select', options:DAYS.map(d=>({value:d,label:d}))},
    {name:'startTime',label:'Start Time',  type:'time', required:true},
    {name:'endTime',  label:'End Time',    type:'time', required:true},
  ],
});
// Show create button only for admins
const u = API.getUser();
if (u && u.role === 'admin') document.getElementById('create-btn').style.display='';
</script>
</body>
</html>
