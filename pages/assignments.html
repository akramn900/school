<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Assignments – SchoolMS</title>
  <link rel="stylesheet" href="../css/style.css">
  <script>window.BACKEND_URL='https://script.google.com/macros/s/AKfycbz42jbxkFCmq0F9F8jo7kka9PuYraYBO8vU1z0FSkVRxmHVt069gy9JYdP06K5-vrECRw/exec';</script>
  <script
    data-clerk-publishable-key="pk_test_YWxlcnQtY293LTMyLmNsZXJrLmFjY291bnRzLmRldiQ"
    src="https://unpkg.com/@clerk/clerk-js@latest/dist/clerk.browser.js"
    type="text/javascript"
  ></script>
  <script src="../js/clerk-auth.js"></script>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main-content">
    <header class="top-header">
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <div class="header-search"><span>🔍</span><input type="text" placeholder="Search…" id="search-input"></div>
      <div class="header-right"><div class="user-badge" id="user-info"></div></div>
    </header>
    <main class="page-content">
      <div class="page-header">
        <h1 class="page-title">📋 Assignments</h1>
        <button class="btn btn-primary" id="create-btn">+ Add Assignment</button>
      </div>
      <div class="card">
        <div id="data-table-container"><div class="loading">Loading…</div></div>
        <div id="pagination"></div>
      </div>
    </main>
  </div>
</div>
<script src="../js/api.js"></script><script src="../js/utils.js"></script>
<script src="../js/sidebar.js"></script><script src="../js/crud-page.js"></script>
<script>
initCrudPage({
  resource:'assignments', allowedRoles:['admin','teacher','student','parent'],
  apiList:p=>API.getAssignments(p), apiCreate:d=>API.createAssignment(d),
  apiUpdate:d=>API.updateAssignment(d), apiDelete:id=>API.deleteAssignment(id),
  searchKey:'title',
  columns:[
    {key:'title',    label:'Assignment'},
    {key:'lessonId', label:'Lesson ID'},
    {key:'startDate',label:'Start',    render:r=>fmtDate(r.startDate)},
    {key:'dueDate',  label:'Due Date', render:r=>`<span class="badge badge-yellow">${fmtDate(r.dueDate)}</span>`},
  ],
  formFields:[
    {name:'title',    label:'Title',    required:true, span2:true},
    {name:'lessonId', label:'Lesson ID',required:true},
    {name:'startDate',label:'Start Date',type:'date'},
    {name:'dueDate',  label:'Due Date',  type:'date',required:true},
  ],
});
</script>
</body>
</html>
