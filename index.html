<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchooLama – Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<!--
  ════════════════════════════════════════════════════════════════
  IMPORTANT: Replace the key below with your FULL publishable key.
  Get it from: Clerk Dashboard → API Keys → Publishable key
  It looks like: pk_test_AbCdEfGhIjKlMnOpQrStUvWxYz...  (long string)
  The value in the screenshot was truncated — use the full one.
  ════════════════════════════════════════════════════════════════
-->
<script
  data-clerk-publishable-key="pk_test_YWxlcnQtY293LTMyLmNsZXJrLmFjY291bnRzLmRldiQ"
  src="https://unpkg.com/@clerk/clerk-js@latest/dist/clerk.browser.js"
  type="text/javascript"
></script>

<style>
:root {
  --sky:#C3EBFA; --sky-light:#EDF9FD; --purple:#CFCEFF; --purple-light:#F1F0FF;
  --yellow:#FAE27C; --yellow-light:#FEFCE8; --bg:#F7F8FA; --white:#ffffff;
  --text:#1a1a2e; --text-muted:#6b7280; --border:#e5e7eb;
  --primary:#4361EE; --primary-dark:#3451db; --danger:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;
  display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;
  background-image:
    radial-gradient(circle at 20% 20%,rgba(195,235,250,.4) 0%,transparent 50%),
    radial-gradient(circle at 80% 80%,rgba(207,206,255,.4) 0%,transparent 50%);
}
.card{
  background:var(--white);border-radius:20px;padding:36px 40px;
  width:100%;max-width:440px;margin:0 20px;
  box-shadow:0 4px 32px rgba(0,0,0,.09);border:1px solid var(--border);
}
.logo{text-align:center;margin-bottom:24px;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px;}
.logo-icon{
  width:40px;height:40px;background:var(--primary);border-radius:10px;
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;
}
.logo-text{font-family:'Playfair Display',serif;font-size:26px;color:var(--text);}
.logo p{color:var(--text-muted);font-size:14px;}

/* Role tabs */
.tabs{
  display:grid;grid-template-columns:repeat(4,1fr);gap:5px;
  background:var(--bg);padding:4px;border-radius:10px;margin-bottom:20px;
}
.tab{
  padding:8px 4px;border:none;background:transparent;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  color:var(--text-muted);cursor:pointer;transition:all .2s;
}
.tab.active{background:var(--white);color:var(--primary);box-shadow:0 1px 8px rgba(0,0,0,.1);}

/* Clerk container */
#clerk-mount{min-height:260px;display:flex;align-items:center;justify-content:center;}

/* Spinner shown while Clerk loads */
.spinner-wrap{text-align:center;color:var(--text-muted);font-size:13px;padding:20px 0;}
.spin{
  width:28px;height:28px;border:3px solid var(--border);
  border-top-color:var(--primary);border-radius:50%;
  animation:spin .7s linear infinite;margin:0 auto 10px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error box */
.err-box{
  background:#fef2f2;border:1px solid #fecaca;border-radius:10px;
  padding:12px 16px;font-size:13px;color:var(--danger);line-height:1.6;
  margin-top:8px;display:none;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-row">
      <div class="logo-icon">S</div>
      <span class="logo-text">SchooLama</span>
    </div>
    <p>Sign in to your account</p>
  </div>

  <!-- Role selector — saved to localStorage, picked up by dashboard -->
  <div class="tabs" id="role-tabs">
    <button class="tab active" data-role="admin"   onclick="setRole('admin')">Admin</button>
    <button class="tab"        data-role="teacher" onclick="setRole('teacher')">Teacher</button>
    <button class="tab"        data-role="student" onclick="setRole('student')">Student</button>
    <button class="tab"        data-role="parent"  onclick="setRole('parent')">Parent</button>
  </div>

  <!-- Clerk mounts its sign-in widget here -->
  <div id="clerk-mount">
    <div class="spinner-wrap">
      <div class="spin"></div>
      Loading secure sign-in…
    </div>
  </div>

  <div class="err-box" id="err-box"></div>
</div>

<script>
// ── Role selection ────────────────────────────────────────────────────────────
let selectedRole = localStorage.getItem('school_pending_role') || 'admin';
document.querySelectorAll('.tab').forEach(t =>
  t.classList.toggle('active', t.dataset.role === selectedRole));

function setRole(r) {
  selectedRole = r;
  localStorage.setItem('school_pending_role', r);
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.role === r));
}

// ── Redirect path helper ──────────────────────────────────────────────────────
function dashboardPath() {
  const path = window.location.pathname;
  const dir  = path.substring(0, path.lastIndexOf('/') + 1);
  return dir + 'dashboard.html';
}

// ── Show error helper ─────────────────────────────────────────────────────────
function showError(msg) {
  const box = document.getElementById('err-box');
  box.textContent = '⚠️ ' + msg;
  box.style.display = 'block';
}

// ── If already signed in, skip straight to dashboard ─────────────────────────
const saved = localStorage.getItem('school_user');
if (saved) {
  try { JSON.parse(saved); window.location.replace(dashboardPath()); }
  catch(e) { localStorage.removeItem('school_user'); }
}

// ── Init Clerk ────────────────────────────────────────────────────────────────
(async function initClerk() {
  try {
    // Clerk SDK is loaded synchronously above, so window.Clerk is available now
    if (typeof window.Clerk === 'undefined') {
      showError('Clerk SDK failed to load. Check your internet connection and try again.');
      document.getElementById('clerk-mount').innerHTML = '';
      return;
    }

    await window.Clerk.load();

    // Already signed in from another tab/session
    if (window.Clerk.user) {
      saveUserAndRedirect(window.Clerk.user);
      return;
    }

    // Mount the built-in SignIn widget
    const mountEl = document.getElementById('clerk-mount');
    mountEl.innerHTML = ''; // remove spinner
    window.Clerk.mountSignIn(mountEl, {
      appearance: {
        variables: {
          colorPrimary:  '#4361EE',
          borderRadius:  '10px',
          fontFamily:    "'DM Sans', sans-serif",
          colorBackground: '#ffffff',
        },
        layout: { socialButtonsVariant: 'iconButton' },
      },
    });

    // Listen for completed sign-in
    window.Clerk.addListener(({ user }) => {
      if (user) saveUserAndRedirect(user);
    });

  } catch (err) {
    showError('Could not initialize authentication: ' + err.message);
    document.getElementById('clerk-mount').innerHTML = '';
  }
})();

function saveUserAndRedirect(user) {
  const role = selectedRole || localStorage.getItem('school_pending_role') || 'admin';
  localStorage.setItem('school_user', JSON.stringify({
    id:       user.id,
    username: user.username || user.emailAddresses?.[0]?.emailAddress || user.id,
    name:     ((user.firstName || '') + ' ' + (user.lastName || '')).trim(),
    email:    user.emailAddresses?.[0]?.emailAddress || '',
    imageUrl: user.imageUrl || '',
    role:     role,
    clerkId:  user.id,
  }));
  localStorage.removeItem('school_pending_role');
  window.location.replace(dashboardPath());
}
</script>
</body>
</html>
